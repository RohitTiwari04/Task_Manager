spring.application.name=taskmanager
server.port=${PORT:8081}

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration Properties
# Secret is a 256-bit (32 bytes) hex-encoded key: "taskmanagerjwtsecretkeyformobileandwebapplications!!!"
taskmanager.jwt.secret=7461736b6d616e616765726a77747365637265746b6579666f726d6f62696c65616e647765626170706c69636174696f6e73212121
taskmanager.jwt.expirationMs=86400000
